<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suslik Work Log</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: #0b0d10;
      --panel-2: #101318;
      --ink: #f5efd5;
      --muted: #8f98a3;
      --line: #252b33;
      --yellow: #f5c542;
      --green: #38d98a;
      --red: #ff5f5f;
      --shadow: 0 14px 42px rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(245, 197, 66, .1), transparent 250px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, .018) 0 1px, transparent 1px 96px),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--ink);
      outline: none;
    }

    textarea {
      min-height: 112px;
      padding: 11px 12px;
      resize: vertical;
      line-height: 1.45;
    }

    input {
      min-height: 40px;
      padding: 0 12px;
    }

    textarea:focus,
    input:focus {
      border-color: var(--yellow);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .shell {
      width: min(1180px, calc(100% - 22px));
      margin: 0 auto;
      padding: 12px 0 24px;
    }

    .topbar {
      min-height: 58px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      background: rgba(11, 13, 16, .95);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(245, 197, 66, .86);
      background: var(--yellow);
      color: #050607;
      font-size: 23px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    h1 {
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      min-height: 32px;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--ink);
      font-size: 12px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    body:not(.owner-mode) .owner-only {
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 10px;
      margin-top: 10px;
      align-items: start;
    }

    .section {
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .section-head {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .section h2 {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .positive {
      color: var(--green);
    }

    .negative {
      color: var(--red);
    }

    .neutral {
      color: var(--yellow);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      min-height: 78px;
      padding: 10px;
      border: 1px solid var(--line);
      background: #080a0c;
    }

    .stat strong {
      display: block;
      color: var(--yellow);
      font-size: clamp(22px, 2.8vw, 34px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .monthbar {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 18% 22%, rgba(245, 197, 66, .18), transparent 20%),
        radial-gradient(circle at 82% 40%, rgba(255, 255, 255, .08), transparent 18%),
        #080a0c;
    }

    .monthbar strong {
      text-align: center;
      font-size: 14px;
      text-transform: uppercase;
    }

    .nav {
      min-height: 32px;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--muted);
      font-size: 20px;
      font-weight: 950;
    }

    .nav:hover,
    .ghost:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .weekdays {
      margin-bottom: 4px;
    }

    .weekdays span {
      color: var(--muted);
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .day {
      position: relative;
      min-height: 82px;
      padding: 7px;
      border: 1px solid #14171b;
      background:
        radial-gradient(circle at 50% 58%, rgba(255, 255, 255, .08), transparent 34%),
        #090a0c;
      overflow: hidden;
    }

    .day:not(.empty) {
      cursor: pointer;
    }

    .day:not(.empty):hover,
    .day.selected {
      border-color: var(--yellow);
      background:
        radial-gradient(circle at 50% 58%, rgba(245, 197, 66, .18), transparent 42%),
        #0e0f10;
    }

    .day.done {
      border-color: rgba(245, 197, 66, .55);
      background:
        radial-gradient(circle at 56% 58%, rgba(245, 197, 66, .34), transparent 36%),
        #0f0d08;
    }

    .day.today .num {
      color: var(--yellow);
    }

    .day.empty {
      opacity: .35;
    }

    .num {
      position: absolute;
      left: 6px;
      top: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .day-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px 7px 18px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .pay-badge {
      position: absolute;
      right: 5px;
      bottom: 5px;
      min-width: 22px;
      min-height: 18px;
      padding: 2px 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--muted);
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
    }

    .pay-badge.paid {
      border-color: rgba(56, 217, 138, .65);
      color: var(--green);
      background: rgba(56, 217, 138, .12);
    }

    .pay-badge.unpaid {
      border-color: rgba(255, 95, 95, .5);
      color: var(--red);
      background: rgba(255, 95, 95, .08);
    }

    .editor {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .primary,
    .ghost {
      min-height: 40px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .primary {
      background: var(--yellow);
      color: #050607;
      border: 1px solid transparent;
    }

    .primary:hover {
      background: #ffd966;
    }

    .ghost {
      background: #080a0c;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .quick button {
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .quick button:hover {
      color: var(--yellow);
      border-color: var(--yellow);
    }

    .pay-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .pay-toggle button {
      min-height: 36px;
      padding: 0 8px;
      border: 1px solid var(--line);
      background: #080a0c;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .pay-toggle button.active {
      border-color: var(--yellow);
      background: rgba(245, 197, 66, .13);
      color: var(--yellow);
    }

    .pay-toggle button[data-paid="paid"].active {
      border-color: rgba(56, 217, 138, .7);
      background: rgba(56, 217, 138, .12);
      color: var(--green);
    }

    .pay-toggle button[data-paid="unpaid"].active {
      border-color: rgba(255, 95, 95, .58);
      background: rgba(255, 95, 95, .09);
      color: var(--red);
    }

    .details {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .detail-card {
      padding: 10px;
      border: 1px solid var(--line);
      background: #080a0c;
    }

    .detail-card strong,
    .detail-card span {
      display: block;
    }

    .detail-card strong {
      color: var(--yellow);
      font-size: 13px;
      text-transform: uppercase;
    }

    .detail-card span {
      margin-top: 6px;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .footer {
      margin-top: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 14px, 1180px);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions,
      .pill {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 64px;
      }

      .day-text {
        font-size: 10px;
      }

      .actions,
      .quick {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">₿</div>
        <div>
          <h1>Suslik Work Log</h1>
          <p class="sub">робота по дому</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill" id="modePill">viewer</div>
        <div class="pill" id="dbPill">loading</div>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <strong id="monthDone">0/0</strong>
        <span>днів виконано</span>
      </div>
      <div class="stat">
        <strong id="streakNow">0d</strong>
        <span>поточний стрік</span>
      </div>
      <div class="stat">
        <strong id="totalDone">0</strong>
        <span>всього записів</span>
      </div>
    </div>

    <section class="layout">
      <aside class="section owner-only">
        <div class="section-head">
          <h2>Editor</h2>
          <span class="status" id="selectedLabel">today</span>
        </div>
        <div class="editor">
          <div class="field">
            <label for="tasks">що зробив</label>
            <textarea id="tasks" placeholder="Наприклад: кухня, підлога, пил, сміття, ванна"></textarea>
          </div>
          <div class="quick">
            <button type="button" data-task="Кухня">кухня</button>
            <button type="button" data-task="Підлога">підлога</button>
            <button type="button" data-task="Пил">пил</button>
            <button type="button" data-task="Сміття">сміття</button>
            <button type="button" data-task="Ванна">ванна</button>
            <button type="button" data-task="Речі">речі</button>
          </div>
          <div class="field">
            <label>оплата</label>
            <div class="pay-toggle">
              <button type="button" data-paid="unpaid" id="unpaidBtn">неоплачено</button>
              <button type="button" data-paid="paid" id="paidBtn">оплачено</button>
            </div>
          </div>
          <div class="actions">
            <button class="primary" id="saveBtn" type="button">save</button>
            <button class="ghost" id="clearBtn" type="button">clear</button>
          </div>
          <button class="ghost" id="copyViewerBtn" type="button">copy viewer link</button>
          <p class="status" id="statusText">Обери день у календарі, впиши роботу і натисни save.</p>
        </div>
      </aside>

      <section class="section">
        <div class="section-head">
          <h2>Calendar</h2>
          <span class="status" id="latestLabel">no records</span>
        </div>
        <div class="monthbar">
          <button class="nav" id="prevBtn" type="button">‹</button>
          <strong id="monthLabel">Month</strong>
          <button class="nav" id="nextBtn" type="button">›</button>
        </div>
        <div class="weekdays" id="weekdays"></div>
        <div class="calendar" id="calendar"></div>
        <div class="details" id="details"></div>
      </section>
    </section>

    <div class="footer">Watch-only viewer для сімейного контролю виконаної роботи.</div>
  </main>

  <script>
    const storageKey = "suslikWorkLog";
    const dbEndpoint = "https://jsonblob.com/api/jsonBlob/019f1eb8-5d25-7fbe-89b9-356f353a9757";
    const ownerKeyHash = "f276391c7c0e24ca517df8c851354d35d9439b8e63adf6f52d0f552b9a278977";
    let dbSaveTimer = null;
    const state = JSON.parse(localStorage.getItem(storageKey) || "{}");
    state.workEntries = Array.isArray(state.workEntries) ? state.workEntries : [];
    state.month = state.month || localStorage.getItem(`${storageKey}:month`) || "";
    state.selectedDay = state.selectedDay || localStorage.getItem(`${storageKey}:selectedDay`) || "";
    state.selectedPaid = state.selectedPaid || "unpaid";
    state.ownerMode = false;

    const $ = (id) => document.getElementById(id);

    function getOwnerKey() {
      const params = location.hash && location.hash.length > 1 ? new URLSearchParams(location.hash.slice(1)) : new URLSearchParams();
      return params.get("key") || localStorage.getItem(`${storageKey}:ownerKey`) || "";
    }

    async function sha256Hex(value) {
      const encoded = new TextEncoder().encode(value);
      const hash = await crypto.subtle.digest("SHA-256", encoded);
      return Array.from(new Uint8Array(hash)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    async function hasOwnerAccess() {
      const key = getOwnerKey();
      if (!key) return false;
      return await sha256Hex(key) === ownerKeyHash;
    }

    function localDay(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function localMonth(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function formatDay(day) {
      const [, month, date] = day.split("-");
      return `${date}.${month}`;
    }

    function fullMonthLabel(month) {
      const [year, value] = month.split("-").map(Number);
      return new Date(year, value - 1, 1).toLocaleString("uk-UA", { month: "long", year: "numeric" });
    }

    function shiftMonth(month, delta) {
      const [year, value] = (month || localMonth()).split("-").map(Number);
      const date = new Date(year, value - 1 + delta, 1);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function compact(text) {
      return String(text || "").replace(/\s+/g, " ").trim();
    }

    function normalizeEntries() {
      state.workEntries = (Array.isArray(state.workEntries) ? state.workEntries : [])
        .filter((entry) => entry && entry.day && String(entry.tasks || "").trim())
        .map((entry) => ({
          day: entry.day,
          month: entry.month || entry.day.slice(0, 7),
          tasks: String(entry.tasks || "").trim(),
          paid: Boolean(entry.paid),
          updatedAt: entry.updatedAt || entry.createdAt || ""
        }))
        .sort((a, b) => a.day.localeCompare(b.day))
        .slice(-1000);
    }

    function persist() {
      normalizeEntries();
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function databasePayload() {
      normalizeEntries();
      return {
        version: 1,
        title: "Suslik Work Log",
        subtitle: "домашня робота",
        workEntries: state.workEntries,
        updatedAt: new Date().toISOString()
      };
    }

    function applyDatabasePayload(data) {
      if (!data || typeof data !== "object") return;
      if (Array.isArray(data.workEntries)) state.workEntries = data.workEntries;
      normalizeEntries();
    }

    function setDbStatus(label, isError = false) {
      $("dbPill").textContent = label;
      $("dbPill").className = `pill ${isError ? "negative" : label === "saved" || label === "online" ? "positive" : "neutral"}`;
    }

    async function loadDatabase() {
      setDbStatus("loading");
      try {
        const response = await fetch(`${dbEndpoint}?cache=${Date.now()}`, {
          headers: { "Accept": "application/json" },
          cache: "no-store"
        });
        if (!response.ok) throw new Error(`database ${response.status}`);
        const data = await response.json();
        applyDatabasePayload(data);
        persist();
        setDbStatus("online");
      } catch (error) {
        setDbStatus("local", true);
      }
    }

    async function saveDatabase() {
      if (!state.ownerMode) return;
      if (!(await hasOwnerAccess())) {
        setDbStatus("locked", true);
        return;
      }
      try {
        const response = await fetch(dbEndpoint, {
          method: "PUT",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(databasePayload())
        });
        if (!response.ok) throw new Error(`database ${response.status}`);
        setDbStatus("saved");
      } catch (error) {
        setDbStatus("error", true);
      }
    }

    function queueSave() {
      if (!state.ownerMode) return;
      clearTimeout(dbSaveTimer);
      dbSaveTimer = setTimeout(saveDatabase, 600);
    }

    function selectedDay() {
      const selected = state.selectedDay || localDay();
      const month = state.month || localMonth();
      return selected.startsWith(month) ? selected : `${month}-01`;
    }

    function setSelectedDay(day) {
      state.selectedDay = day;
      localStorage.setItem(`${storageKey}:selectedDay`, day);
      $("selectedLabel").textContent = formatDay(day);
    }

    function entryForDay(day) {
      normalizeEntries();
      return state.workEntries.find((entry) => entry.day === day);
    }

    function saveSelectedDay() {
      if (!state.ownerMode) return;
      const day = selectedDay();
      const tasks = $("tasks").value.trim();
      if (!tasks) {
        setStatus("Впиши, що зробив за цей день.", true);
        return;
      }
      normalizeEntries();
      const existing = state.workEntries.find((entry) => entry.day === day);
      if (existing) {
        existing.tasks = tasks;
        existing.paid = state.selectedPaid === "paid";
        existing.updatedAt = new Date().toISOString();
      } else {
        state.workEntries.push({
          day,
          month: day.slice(0, 7),
          tasks,
          paid: state.selectedPaid === "paid",
          updatedAt: new Date().toISOString()
        });
      }
      persist();
      render();
      queueSave();
      setStatus(`Збережено ${formatDay(day)}.`);
    }

    function clearSelectedDay() {
      if (!state.ownerMode) return;
      const day = selectedDay();
      normalizeEntries();
      state.workEntries = state.workEntries.filter((entry) => entry.day !== day);
      persist();
      render();
      queueSave();
      setStatus(`Очищено ${formatDay(day)}.`);
    }

    function addQuickTask(task) {
      const current = $("tasks").value.trim();
      $("tasks").value = current ? `${current}\n${task}` : task;
      $("tasks").focus();
    }

    function setPaidStatus(status) {
      state.selectedPaid = status === "paid" ? "paid" : "unpaid";
      renderPayToggle();
    }

    function renderPayToggle() {
      const paid = state.selectedPaid === "paid";
      if ($("paidBtn")) $("paidBtn").classList.toggle("active", paid);
      if ($("unpaidBtn")) $("unpaidBtn").classList.toggle("active", !paid);
    }

    function positiveStreak(monthKey, byDay) {
      const today = localDay();
      const endDay = today.startsWith(monthKey)
        ? Number(today.slice(-2))
        : new Date(Number(monthKey.slice(0, 4)), Number(monthKey.slice(5, 7)), 0).getDate();
      let streak = 0;
      for (let day = endDay; day >= 1; day -= 1) {
        const key = `${monthKey}-${String(day).padStart(2, "0")}`;
        if (byDay.has(key)) streak += 1;
        else break;
      }
      return streak;
    }

    function setStatus(text, isError = false) {
      $("statusText").textContent = text;
      $("statusText").className = `status ${isError ? "negative" : ""}`;
    }

    function buildViewerLink() {
      return `${location.href.split("#")[0]}#mode=view`;
    }

    async function copyViewerLink() {
      const link = buildViewerLink();
      try {
        await navigator.clipboard.writeText(link);
        setStatus("Viewer link скопійовано.");
      } catch {
        window.prompt("Viewer link", link);
      }
    }

    function render() {
      normalizeEntries();
      state.month = state.month || localMonth();
      localStorage.setItem(`${storageKey}:month`, state.month);
      const selected = selectedDay();
      setSelectedDay(selected);
      const selectedEntry = entryForDay(selected);
      if ($("tasks")) $("tasks").value = selectedEntry ? selectedEntry.tasks : "";
      state.selectedPaid = selectedEntry && selectedEntry.paid ? "paid" : "unpaid";
      renderPayToggle();

      const [year, month] = state.month.split("-").map(Number);
      const firstDate = new Date(year, month - 1, 1);
      const daysInMonth = new Date(year, month, 0).getDate();
      const firstOffset = (firstDate.getDay() + 6) % 7;
      const today = localDay();
      const entriesThisMonth = state.workEntries.filter((entry) => entry.month === state.month);
      const byDay = new Map(entriesThisMonth.map((entry) => [entry.day, entry]));
      const latest = [...state.workEntries].sort((a, b) => b.day.localeCompare(a.day))[0];
      const streak = positiveStreak(state.month, byDay);
      const paidCount = entriesThisMonth.filter((entry) => entry.paid).length;

      $("modePill").textContent = state.ownerMode ? "owner" : "viewer";
      $("monthDone").textContent = `${entriesThisMonth.length}/${daysInMonth}`;
      $("streakNow").textContent = `${streak}d`;
      $("totalDone").textContent = String(state.workEntries.length);
      $("latestLabel").textContent = latest ? `${paidCount}/${entriesThisMonth.length} paid` : "no records";
      $("monthLabel").textContent = fullMonthLabel(state.month);

      $("weekdays").innerHTML = ["П", "В", "С", "Ч", "П", "С", "Н"].map((day) => `<span>${day}</span>`).join("");
      const cells = [];
      for (let i = 0; i < firstOffset; i += 1) {
        cells.push("<div class=\"day empty\"></div>");
      }
      for (let day = 1; day <= daysInMonth; day += 1) {
        const key = `${state.month}-${String(day).padStart(2, "0")}`;
        const entry = byDay.get(key);
        const text = entry ? compact(entry.tasks).slice(0, 48) : "";
        const payClass = entry ? (entry.paid ? "paid" : "unpaid") : "";
        const payLabel = entry ? (entry.paid ? "paid" : "unpaid") : "";
        cells.push(`
          <button class="day${entry ? " done" : ""}${key === today ? " today" : ""}${key === selected ? " selected" : ""}" type="button" data-day="${key}">
            <span class="num">${day}</span>
            <strong class="day-text">${entry ? escapeHtml(text) : ""}</strong>
            ${entry ? `<span class="pay-badge ${payClass}">${payLabel}</span>` : ""}
          </button>
        `);
      }
      $("calendar").innerHTML = cells.join("");
      $("calendar").querySelectorAll(".day[data-day]").forEach((button) => {
        button.addEventListener("click", () => {
          setSelectedDay(button.dataset.day);
          render();
          if (state.ownerMode && $("tasks")) $("tasks").focus();
        });
      });

      const recent = [...state.workEntries].sort((a, b) => b.day.localeCompare(a.day)).slice(0, 6);
      const selectedHtml = selectedEntry ? `
        <div class="detail-card">
          <strong>${formatDay(selectedEntry.day)} · ${selectedEntry.paid ? "оплачено" : "неоплачено"}</strong>
          <span>${escapeHtml(selectedEntry.tasks)}</span>
        </div>
      ` : `
        <div class="detail-card">
          <strong>${formatDay(selected)}</strong>
          <span>Запису за цей день ще нема.</span>
        </div>
      `;
      const recentHtml = recent
        .filter((entry) => entry.day !== selected)
        .map((entry) => `
          <div class="detail-card">
            <strong>${formatDay(entry.day)} · ${entry.paid ? "оплачено" : "неоплачено"}</strong>
            <span>${escapeHtml(entry.tasks)}</span>
          </div>
        `)
        .join("");
      $("details").innerHTML = selectedHtml + recentHtml;
    }

    function applyHashConfig() {
      const params = location.hash && location.hash.length > 1 ? new URLSearchParams(location.hash.slice(1)) : new URLSearchParams();
      if (params.get("key")) localStorage.setItem(`${storageKey}:ownerKey`, params.get("key"));
      state.ownerMode = params.get("owner") === "1";
      document.body.classList.toggle("owner-mode", state.ownerMode);
    }

    $("prevBtn").addEventListener("click", () => {
      state.month = shiftMonth(state.month || localMonth(), -1);
      localStorage.setItem(`${storageKey}:month`, state.month);
      persist();
      render();
    });

    $("nextBtn").addEventListener("click", () => {
      state.month = shiftMonth(state.month || localMonth(), 1);
      localStorage.setItem(`${storageKey}:month`, state.month);
      persist();
      render();
    });

    $("saveBtn").addEventListener("click", saveSelectedDay);
    $("clearBtn").addEventListener("click", clearSelectedDay);
    $("copyViewerBtn").addEventListener("click", copyViewerLink);
    document.querySelectorAll("[data-task]").forEach((button) => {
      button.addEventListener("click", () => addQuickTask(button.dataset.task));
    });
    document.querySelectorAll("[data-paid]").forEach((button) => {
      button.addEventListener("click", () => setPaidStatus(button.dataset.paid));
    });
    window.addEventListener("hashchange", () => location.reload());

    async function init() {
      applyHashConfig();
      render();
      await loadDatabase();
      render();
    }

    init();
  </script>
</body>
</html>
